<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKS Çalışma Asistanı</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            --card: rgba(255,255,255,0.88);
            --accent: #d81b60;
            --accent-dark: #ad1457;
            --soft: #f48fb1;
            --pale: #fce4ec;
            --text: #4a4a4a;
            --muted: #9e9e9e;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--accent);
            text-align: center;
            font-size: 2rem;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 22px 24px;
            box-shadow: 0 8px 20px rgba(216,27,96,0.10);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .card-full { flex: 1 1 100%; }
        .card-half { flex: 1 1 340px; }

        h2 {
            color: var(--accent);
            text-align: center;
            margin: 0 0 18px 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ── MOTİVASYON KARTI ── */
        .motivation-card {
            flex: 1 1 100%;
            background: linear-gradient(135deg, #d81b60 0%, #f06292 100%);
            color: white;
            text-align: center;
            padding: 28px 32px;
        }

        .motivation-card h2 { color: white; }

        .motivation-text {
            font-size: 1.25rem;
            font-style: italic;
            line-height: 1.7;
            margin-bottom: 12px;
            min-height: 60px;
        }

        .motivation-day {
            font-size: 0.9rem;
            opacity: 0.85;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-refresh {
            background: rgba(255,255,255,0.25);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 14px;
            transition: all 0.3s;
        }
        .btn-refresh:hover {
            background: rgba(255,255,255,0.40);
            transform: none;
            box-shadow: none;
        }

        /* ── HAFTALIK PROGRAM ── */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 14px;
        }

        .day-box {
            background: rgba(255,255,255,0.9);
            border: 2px dashed var(--soft);
            border-radius: 14px;
            padding: 12px;
        }

        .day-box.today {
            border: 2px solid var(--accent);
            box-shadow: 0 0 0 3px rgba(216,27,96,0.10);
        }

        .day-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--pale);
            padding-bottom: 6px;
            margin-bottom: 8px;
        }

        .day-header h3 {
            color: var(--accent);
            margin: 0;
            font-size: 1rem;
        }

        .today-badge {
            background: var(--accent);
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 10px;
            letter-spacing: 0.5px;
        }

        .subject-list { list-style: none; padding: 0; margin: 0; }

        .subject-item {
            display: flex;
            align-items: center;
            background: var(--pale);
            margin-bottom: 5px;
            border-radius: 8px;
            overflow: hidden;
            font-size: 0.88rem;
        }

        .subject-item input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px 8px;
            font-size: 0.88rem;
            color: var(--text);
            font-family: inherit;
            outline: none;
            min-width: 0;
        }

        .subject-item input[type="text"]:focus {
            background: rgba(216,27,96,0.06);
        }

        .subject-item input[type="checkbox"] {
            margin: 0 6px 0 8px;
            accent-color: var(--accent);
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .subject-item input[type="text"].done {
            text-decoration: line-through;
            color: var(--muted);
        }

        .del-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 0 8px;
            font-size: 1rem;
            line-height: 1;
            box-shadow: none;
            flex-shrink: 0;
        }
        .del-btn:hover {
            color: var(--accent);
            background: none;
            transform: none;
            box-shadow: none;
        }

        .add-subject-btn {
            background: none;
            border: 1px dashed var(--soft);
            color: var(--accent);
            font-size: 0.82rem;
            padding: 5px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
            box-shadow: none;
            transition: background 0.2s;
        }
        .add-subject-btn:hover {
            background: var(--pale);
            transform: none;
            box-shadow: none;
        }

        /* ── GERİ SAYIM & KRONOMETRE ── */
        .timer {
            font-size: 2.3em;
            text-align: center;
            font-weight: bold;
            color: var(--accent);
            margin: 16px 0;
            letter-spacing: 2px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 22px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.88rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(216,27,96,0.18);
        }
        button:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(216,27,96,0.25);
        }

        /* ── İLERLEME / KONU TAKİP ── */
        .progress-card { flex: 1 1 100%; }

        .subject-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--pale);
            color: var(--accent);
            border: 2px solid transparent;
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: none;
            transition: all 0.2s;
        }
        .tab-btn:hover { background: #f8bbd0; transform: none; box-shadow: none; }
        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 3px 8px rgba(216,27,96,0.25);
        }

        .progress-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }

        .overview-chip {
            background: rgba(255,255,255,0.9);
            border: 1px solid #f8bbd0;
            border-radius: 14px;
            padding: 10px 14px;
            text-align: center;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .overview-chip:hover { box-shadow: 0 4px 12px rgba(216,27,96,0.15); }
        .overview-chip.active-chip { border: 2px solid var(--accent); }

        .chip-name {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .chip-flower { font-size: 1.3rem; margin-bottom: 2px; }
        .chip-pct {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }

        .chip-bar-bg {
            height: 6px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-top: 6px;
            overflow: hidden;
        }
        .chip-bar-fill {
            height: 6px;
            background: linear-gradient(90deg, #f48fb1, var(--accent));
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        /* Konu detay paneli */
        .topic-panel {
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid #f8bbd0;
        }

        .topic-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .topic-panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-summary {
            font-size: 0.82rem;
            color: var(--muted);
            background: var(--pale);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 8px;
        }

        .topic-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--pale);
            border-radius: 10px;
            padding: 8px 10px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }
        .topic-item:hover { background: #f8bbd0; }
        .topic-item.checked { background: rgba(216,27,96,0.08); }

        .topic-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--soft);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        .topic-item.checked .topic-check {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .topic-label {
            font-size: 0.88rem;
            color: var(--text);
            flex: 1;
        }
        .topic-item.checked .topic-label {
            text-decoration: line-through;
            color: var(--muted);
        }

        .add-topic-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .add-topic-inp {
            flex: 1;
            border: 1px dashed var(--soft);
            background: white;
            border-radius: 10px;
            padding: 7px 12px;
            font-size: 0.88rem;
            font-family: inherit;
            color: var(--text);
            outline: none;
        }
        .add-topic-inp:focus { border-color: var(--accent); }
        .add-topic-inp::placeholder { color: var(--muted); }

        .add-topic-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 7px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: none;
            transition: background 0.2s;
        }
        .add-topic-btn:hover { background: var(--accent-dark); transform: none; box-shadow: none; }

        /* Floating çiçekler */
        .petal {
            position: fixed;
            pointer-events: none;
            font-size: 1.3rem;
            animation: fall linear forwards;
            z-index: 9999;
            opacity: 0.85;
        }
        @keyframes fall {
            0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* ── TAVŞAN NPC CSS ── */
        .rabbit-container {
            position: fixed;
            top: 80vh;
            left: 80vw;
            z-index: 10000;
            transition: left 2.5s ease-in-out, top 2.5s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none; 
        }

        .rabbit-icon {
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(216,27,96,0.3));
            transform: scaleX(-1);
            transition: transform 0.5s;
        }

        .speech-bubble {
            background: white;
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--accent);
            font-size: 0.95rem;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(216,27,96,0.15);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            margin-bottom: 8px;
            text-align: center;
            white-space: nowrap;
        }

        .speech-bubble.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<h1>🤍 YKS Çalışma İstasyonu 🤍</h1>

<div class="container">

    <div class="card motivation-card">
        <h2>✨ Günlük Motivasyon</h2>
        <div class="motivation-text" id="motivationText"></div>
        <div class="motivation-day" id="motivationDay"></div>
        <button class="btn-refresh" onclick="refreshMotivation()">🔄 Yeni söz</button>
    </div>

    <div class="card card-full">
        <h2>🌷 Haftalık Çalışma Programı 🌷</h2>
        <div class="schedule-grid" id="scheduleGrid"></div>
    </div>

    <div class="card card-half">
        <h2>⏳ YKS'ye Kalan Süre</h2>
        <div id="countdown" class="timer">Hesaplanıyor...</div>
    </div>

    <div class="card card-half">
        <h2>⏱ Çalışma Kronometresi</h2>
        <div id="stopwatch" class="timer">00:00:00</div>
        <div class="btn-group">
            <button onclick="startStopwatch()">▶ Başlat</button>
            <button onclick="stopStopwatch()">⏸ Durdur</button>
            <button onclick="resetStopwatch()">↺ Sıfırla</button>
        </div>
    </div>

    <div class="card progress-card">
        <h2>🌸 Konu İlerleme Çizelgesi 🌸</h2>

        <div class="progress-overview" id="overviewChips"></div>

        <div class="subject-tabs" id="subjectTabs"></div>

        <div class="topic-panel">
            <div class="topic-panel-header">
                <div class="topic-panel-title" id="panelTitle">🌷 Ders Seç</div>
                <div class="panel-summary" id="panelSummary"></div>
            </div>
            <div class="topic-grid" id="topicGrid"></div>
            <div class="add-topic-row">
                <input class="add-topic-inp" id="newTopicInp" placeholder="Yeni konu ekle..." />
                <button class="add-topic-btn" onclick="addTopic()">+ Ekle</button>
            </div>
        </div>
    </div>

</div>

<div id="studyRabbit" class="rabbit-container">
    <div class="speech-bubble" id="rabbitMessage"></div>
    <div class="rabbit-icon">🐇</div>
</div>

<script>
// ── VERİ ──────────────────────────────────────────────────────────────────────

const DAYS = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];

const defaultSchedule = {
    'Pazartesi':  ['TYT Matematik', 'TYT Türkçe', 'Fizik'],
    'Salı':       ['AYT Matematik', 'Kimya', 'Paragraf & Problem'],
    'Çarşamba':   ['TYT Matematik', 'Biyoloji', 'Geometri'],
    'Perşembe':   ['AYT Matematik', 'Fizik', 'TYT Türkçe'],
    'Cuma':       ['TYT Matematik', 'Kimya', 'Paragraf & Problem'],
    'Cumartesi':  ['AYT Matematik', 'Biyoloji', 'Haftalık Tekrar'],
};

const motivations = [
    "Bugün attığın her adım, seni hayal ettiğin yere bir adım daha yaklaştırıyor. 🌸",
    "Zorluk, büyümenin işaretidir. Karanlık tünelin sonunda ışık mutlaka var. ✨",
    "Sen bunu hak ediyorsun. Çalış, inan, başar. 💪",
    "Küçük adımlar bile seni ilerletiyor. Durma, devam et! 🚀",
    "Dün kendinden daha bilgilisin bugün. Bu en büyük kazanım. 📖",
    "Vazgeçmek yok. Her tekrar, her soru seni güçlendiriyor. 🌷",
    "Yorulduğunda dur, ama asla vazgeçme. Mola vermek zayıflık değil. ☕",
    "Hayaller için bedel ödenir; sen bu bedeli ödemeye değer birisin. 🌟",
    "Başkalarıyla yarışma, dünkü kendinle yarış. 💎",
    "Her sabah yeni bir başlangıç. Bugün harika şeyler yapabilirsin! 🌅",
    "Beyin kaslar gibidir — ne kadar çalışırsan o kadar güçlenir. 🧠",
    "Hedefin net, yolun zorlu ama sen daha da güçlüsün. 🏆",
];

// ── PROGRAM ──────────────────────────────────────────────────────────────────

function getTodayName() {
    const map = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
    return map[new Date().getDay()];
}

function loadSchedule() {
    try {
        const s = localStorage.getItem('yks_schedule');
        return s ? JSON.parse(s) : JSON.parse(JSON.stringify(defaultSchedule));
    } catch(e) { return JSON.parse(JSON.stringify(defaultSchedule)); }
}

function saveSchedule(data) {
    localStorage.setItem('yks_schedule', JSON.stringify(data));
}

function loadChecked() {
    try { return JSON.parse(localStorage.getItem('yks_checked') || '{}'); }
    catch(e) { return {}; }
}

function saveChecked(data) {
    localStorage.setItem('yks_checked', JSON.stringify(data));
}

let scheduleData = loadSchedule();
let checkedData  = loadChecked();

function renderSchedule() {
    const grid    = document.getElementById('scheduleGrid');
    const today   = getTodayName();
    grid.innerHTML = '';

    DAYS.forEach(day => {
        const subjects = scheduleData[day] || [];
        const isToday  = day === today;

        const box = document.createElement('div');
        box.className = 'day-box' + (isToday ? ' today' : '');

        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerHTML = `<h3>${day}</h3>${isToday ? '<span class="today-badge">BUGÜN</span>' : ''}`;
        box.appendChild(header);

        const ul = document.createElement('ul');
        ul.className = 'subject-list';

        subjects.forEach((subj, idx) => {
            ul.appendChild(makeSubjectItem(day, idx, subj));
        });

        box.appendChild(ul);

        // "+ Ders ekle" butonu
        const addBtn = document.createElement('button');
        addBtn.className = 'add-subject-btn';
        addBtn.textContent = '+ Ders ekle';
        addBtn.onclick = () => {
            scheduleData[day] = scheduleData[day] || [];
            scheduleData[day].push('');
            saveSchedule(scheduleData);
